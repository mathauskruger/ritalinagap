version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: ritalinagap_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d   # roda schema.sql automaticamente
    restart: unless-stopped

  superset:
    image: apache/superset:3.1.0
    container_name: ritalinagap_superset
    environment:
      SUPERSET_SECRET_KEY: "ritalinagap-secret-key-troque-em-prod"
    ports:
      - "8088:8088"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata: